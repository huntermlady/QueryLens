name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build

  deploy:
    name: Build and publish docs
    if: github.ref_name == 'main' && github.actor != 'github-actions[bot]'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Copy build to docs folder
        run: |
          rm -rf docs
          mkdir -p docs
          cp -a dist/. docs/
          touch docs/.nojekyll

      - name: Commit docs update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- docs; then
            git add docs
            git commit -m "ci: update docs site"
            git push origin HEAD
          else
            echo "No docs changes to commit"
          fi
